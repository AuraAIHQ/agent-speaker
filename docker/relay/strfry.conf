# strfry relay configuration
# https://github.com/hoytech/strfry

relay {
    # Database path
    db = "./data/strfry-db"
    
    # Maximum accepted incoming websocket frame size (bytes)
    maxWebsocketPayloadSize = 131072
    
    # Maximum number of subscriptions per connected client
    maxSubsPerConnection = 20
    
    # IP address to bind to (0.0.0.0 = all interfaces)
    bind = "0.0.0.0"
    
    # Port to listen on
    port = 7777
    
    # Number of threads to process Nostr events
    numThreads = 4
    
    # Maximum number of concurrent connections
    maxConnections = 1000
    
    # Real-ip header (set to empty to disable)
    realIpHeader = ""
    
    # Logging verbosity (trace/debug/info/warning/error)
    logging = "info"
    
    # Enable compression (permessage-deflate)
    compression.enabled = true
    compression.slidingWindow = true
}

# Info for NIP-11
info {
    name = "Agent-Speaker Local Relay"
    description = "Local development relay for agent-speaker"
    pubkey = ""
    contact = ""
    supported_nips = [1, 2, 4, 9, 11, 22, 28, 40, 50]
    software = "strfry"
    version = "0.9"
}

# Event verification
events {
    # Reject events that are older than this (seconds)
    rejectEventsOlderThanSeconds = 94608000  # 3 years
    
    # Reject events that are newer than this many seconds in the future
    rejectEventsNewerThanSeconds = 900  # 15 minutes
    
    # Reject events with created_at in the future
    rejectFutureEvents = true
}

# Plugin configuration (optional)
plugin = ""
